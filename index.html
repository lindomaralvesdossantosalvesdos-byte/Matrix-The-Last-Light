<style>

@font-face {
  font-family: 'Rajdhani';
  src: local('Rajdhani'), local('Impact'), local('Arial Narrow'), local('Arial');
  font-weight: 300 600;
}

@font-face {
  font-family: 'Share Tech Mono';
  src: local('Share Tech Mono'), local('Courier New'), local('Courier'), local('monospace');
}

@font-face {
  font-family: 'VT323';
  src: local('VT323'), local('Courier New'), local('Courier');
}

:root {
  --font-title: 'Rajdhani', 'Impact', 'Arial Narrow', sans-serif;
  --font-ui: 'Share Tech Mono', 'Courier New', monospace;
  --font-pixel: 'VT323', 'Courier New', monospace;
}

#s-wardrobe{justify-content:flex-start;padding:0;overflow-y:auto;background:#000;}
.wd-header{width:100%;padding:16px 20px 12px;text-align:center;border-bottom:1px solid rgba(0,255,65,.1);background:linear-gradient(180deg,rgba(0,8,0,.95)0%,transparent 100%);flex-shrink:0;}
.wd-title{font-size:clamp(12px,3.5vw,18px);letter-spacing:6px;text-shadow:0 0 20px rgba(0,255,65,.5);}
.wd-sub{font-size:8px;letter-spacing:4px;color:rgba(0,255,65,.4);margin-top:3px;}
.wd-badge{display:inline-block;margin-top:7px;font-size:7px;letter-spacing:2px;color:rgba(0,255,65,.2);border:1px solid rgba(0,255,65,.07);padding:3px 10px;border-radius:2px;}
.wd-wardrobe{display:flex;gap:6px;padding:12px 6px 8px;width:100%;max-width:520px;align-self:center;justify-content:center;align-items:flex-start;flex-shrink:0;}
.wd-panel{flex:1;min-width:0;background:rgba(0,4,0,.95);border:1px solid rgba(0,255,65,.07);border-radius:3px;display:flex;flex-direction:column;align-items:center;padding:8px 4px 10px;cursor:pointer;position:relative;overflow:hidden;transition:transform .22s,box-shadow .22s,border-color .22s;}
.wd-panel::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 50% 0%,rgba(var(--wpc),.1)0%,transparent 65%);opacity:0;transition:opacity .22s;pointer-events:none;}
.wd-panel::after{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(var(--wpc),.6),transparent);opacity:0;transition:opacity .2s;pointer-events:none;}
.wd-panel:hover{transform:translateY(-4px);border-color:rgba(var(--wpc),.5);}
.wd-panel:hover::before,.wd-panel:hover::after{opacity:1;}
.wd-panel.wd-selected{transform:translateY(-3px);border-color:rgba(var(--wpc),.9);background:rgba(var(--wpc),.04);animation:wdGlow 2.5s ease-in-out infinite;}
.wd-panel.wd-selected::before,.wd-panel.wd-selected::after{opacity:1;}
@keyframes wdGlow{0%,100%{box-shadow:0 0 28px rgba(var(--wpc),.18),0 0 0 1px rgba(var(--wpc),.28)}50%{box-shadow:0 0 52px rgba(var(--wpc),.35),0 0 0 1px rgba(var(--wpc),.52)}}
.wd-pname{font-size:8px;letter-spacing:3px;text-transform:uppercase;margin-bottom:2px;text-shadow:0 0 10px rgba(var(--wpc),.5);}
.wd-psub{font-size:6.5px;letter-spacing:1px;color:rgba(255,255,255,.2);margin-bottom:8px;text-align:center;}
.wd-canvas{display:block;image-rendering:pixelated;image-rendering:crisp-edges;}
.wd-weapon{font-size:6.5px;letter-spacing:1px;color:rgba(255,255,255,.22);margin:6px 0 3px;text-align:center;line-height:1.8;}
.wd-price{font-size:7.5px;color:rgba(255,215,60,.5);letter-spacing:1px;margin-bottom:5px;}
.wd-stats{width:100%;border-top:1px solid rgba(0,255,65,.07);padding-top:6px;margin-top:2px;}
.wd-stat{font-size:7px;line-height:2;display:flex;justify-content:space-between;color:rgba(255,255,255,.28);padding:0 2px;}
.wd-pos{color:#2aaa50;}.wd-neg{color:#aa3232;}
.wd-btn{margin-top:8px;width:calc(100% - 6px);background:transparent;border:1px solid rgba(var(--wpc),.2);color:rgba(var(--wpc),.55);font-family:var(--font-ui);font-size:7.5px;letter-spacing:2px;padding:7px 2px;cursor:pointer;transition:all .2s;border-radius:2px;text-transform:uppercase;}
.wd-btn:hover{background:rgba(var(--wpc),.1);border-color:rgba(var(--wpc),.7);color:rgb(var(--wpc));}
.wd-btn.wd-eq{background:rgba(var(--wpc),.15);color:#fff;border-color:rgb(var(--wpc));text-shadow:0 0 8px rgba(var(--wpc),.7);}
.wd-lock{position:absolute;inset:0;background:rgba(0,0,0,.88);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:7px;backdrop-filter:blur(2px);border-radius:3px;}
.wd-lock-icon{font-size:26px;filter:grayscale(1);opacity:.45;}
.wd-lock-text{font-size:7px;letter-spacing:2px;color:rgba(255,255,255,.22);text-align:center;line-height:2;}
.wd-lock-req{font-size:6.5px;color:rgba(0,255,65,.22);letter-spacing:1px;border:1px solid rgba(0,255,65,.1);padding:3px 9px;border-radius:2px;text-align:center;line-height:1.8;}
.wd-footer{padding:12px 20px;text-align:center;font-size:8px;letter-spacing:2px;color:rgba(0,255,65,.18);border-top:1px solid rgba(0,255,65,.05);width:100%;max-width:520px;align-self:center;line-height:1.8;transition:color .3s;flex-shrink:0;}
.wd-back-bar{width:100%;max-width:520px;align-self:center;flex-shrink:0;display:flex;align-items:center;gap:10px;padding:10px 14px 6px;border-bottom:1px solid rgba(0,255,65,.07);}
</style>

body.theme-imutavel{
  --g:#FFD700;
  --gd:#B8860B;
  --gdk:#3a2800;
  --g-faint:rgba(255,215,0,.06);
  --g-border:rgba(255,215,0,.2);
  --bg:#000;
  --bg2:#0a0800;
}

  color:#FFD700;

  background:linear-gradient(90deg,transparent,#FFD700,transparent);

}

.scr{
  display:none;position:fixed;inset:0;z-index:2;
  flex-direction:column;align-items:center;justify-content:center;
  padding:24px 20px;
  transition:opacity .3s ease;
}
.scr.on{display:flex;}
.scr.fading-out{opacity:0;pointer-events:none;}
.scr.fading-in{animation:scrIn .35s ease forwards;}
@keyframes scrIn{from{opacity:0}to{opacity:1}}

#s-menu{gap:0;}

.logo{
  font-family:var(--title);
  font-size:clamp(68px,20vw,120px);
  color:var(--g);
  text-shadow:0 0 40px rgba(0,255,65,.6), 0 0 80px rgba(0,255,65,.2);
  text-align:center;
  line-height:.88;
  letter-spacing:6px;
  animation:flicker 8s infinite;
}
.logo-sub{
  font-family:var(--font-ui);
  font-size:clamp(13px,3.5vw,18px);
  color:var(--gd);
  letter-spacing:12px;
  text-align:center;
  font-weight:300;
  margin-top:8px;
  margin-bottom:48px;
  opacity:.8;
}
@keyframes flicker{0%,91%,93.5%,100%{opacity:1}92%{opacity:.2}93%{opacity:.9}}

.mbtn{
  background:transparent;
  color:var(--g);
  border:1px solid var(--g-border);
  font-family:var(--font-ui);
  font-weight:500;
  font-size:14px;
  letter-spacing:5px;
  padding:16px 0;
  width:min(300px,88vw);
  margin:5px 0;
  text-transform:uppercase;
  transition:all .25s ease;
  position:relative;
  border-radius:var(--radius);
}
.mbtn::after{
  content:'';
  position:absolute;
  inset:0;
  border-radius:var(--radius);
  background:var(--g-faint);
  opacity:0;
  transition:opacity .25s;
}
.mbtn:hover{
  border-color:rgba(0,255,65,.5);
  color:#fff;
  letter-spacing:6px;
  box-shadow:0 0 24px rgba(0,255,65,.15), inset 0 0 20px rgba(0,255,65,.04);
}
.mbtn:hover::after{opacity:1;}
.mbtn:active{transform:scale(.98);}
.menu-footer{
  position:absolute;bottom:20px;
  font-family:var(--font-ui);font-weight:300;
  font-size:11px;color:var(--gd);letter-spacing:3px;opacity:.3;
  text-align:center;line-height:1.8;
}

#s-daytr{background:#000;}
.daytr-line{width:60px;height:1px;background:var(--g-border);margin-bottom:20px;}
.daytr-proto{
  font-family:var(--font-ui);font-weight:300;
  font-size:11px;letter-spacing:8px;color:var(--gd);
  margin-bottom:12px;opacity:.6;
}
.daytr-num{
  font-family:var(--title);
  font-size:clamp(90px,24vw,150px);
  color:var(--g);
  text-shadow:0 0 40px rgba(0,255,65,.5),0 0 100px rgba(0,255,65,.15);
  animation:dayPulse 2s ease-in-out infinite;
  line-height:1;
}
.daytr-total{
  font-family:var(--font-ui);font-weight:300;
  font-size:13px;color:var(--gd);
  letter-spacing:6px;margin-top:8px;opacity:.5;
}
@keyframes dayPulse{0%,100%{opacity:1}50%{opacity:.55}}
.salvo-badge{
  position:absolute;top:20px;right:20px;
  font-family:var(--font-ui);font-size:11px;
  color:var(--gd);letter-spacing:2px;
  display:flex;align-items:center;gap:6px;opacity:.4;
}

#s-game{justify-content:flex-start;padding:0;}

.hud{
  width:100%;
  background:rgba(0,0,0,.96);
  border-bottom:1px solid var(--g-border);
  padding:10px 16px 8px;
  flex-shrink:0;z-index:10;
}
.hud-top{
  display:flex;justify-content:space-between;
  align-items:center;margin-bottom:8px;
}
.hud-day-info{
  font-family:var(--font-ui);font-weight:500;
  font-size:12px;color:var(--gd);letter-spacing:3px;
}
.hud-weapon{
  font-family:var(--font-ui);font-size:12px;
  color:var(--g);display:flex;align-items:center;gap:5px;letter-spacing:1px;
}
.hud-bars{display:flex;flex-direction:row;gap:6px;}
.hud-stat{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;}
.hud-lbl{
  font-family:var(--font-ui);font-weight:400;
  font-size:9px;color:rgba(255,255,255,.3);letter-spacing:1px;text-transform:uppercase;
}
.hud-track{
  width:100%;height:5px;
  background:rgba(255,255,255,.06);
  border-radius:3px;overflow:hidden;
}
.hud-fill{height:100%;transition:width .6s cubic-bezier(.4,0,.2,1);border-radius:3px;}
.f-hp {background:linear-gradient(90deg,#00cc33,#00FF41);}
.f-san{background:linear-gradient(90deg,#5555cc,#8888FF);}
.f-luc{background:linear-gradient(90deg,#0088bb,#00CCFF);}
.f-esp{background:linear-gradient(90deg,#cc9900,#FFD700);}
.f-rad{background:linear-gradient(90deg,#cc3300,#FF5500);}
.hud-val{
  font-family:var(--font-ui);font-weight:600;
  font-size:11px;color:rgba(255,255,255,.5);text-align:center;
}
.hud-val.danger{color:var(--red);}

.game-body{
  flex:1;width:100%;overflow-y:auto;
  padding:18px 16px 32px;
  display:flex;flex-direction:column;gap:14px;
  transition:opacity .22s ease;
}
.game-body.fading{opacity:0;}
.game-body::-webkit-scrollbar{width:2px;}
.game-body::-webkit-scrollbar-thumb{background:var(--g-border);border-radius:2px;}

.game-body > *{
  opacity:0;transform:translateY(10px);
  animation:itemIn .32s ease forwards;
}
@keyframes itemIn{to{opacity:1;transform:none}}
.game-body>*:nth-child(1){animation-delay:.04s}
.game-body>*:nth-child(2){animation-delay:.11s}
.game-body>*:nth-child(3){animation-delay:.18s}
.game-body>*:nth-child(4){animation-delay:.25s}
.game-body>*:nth-child(5){animation-delay:.32s}
.game-body>*:nth-child(6){animation-delay:.38s}
.game-body>*:nth-child(7){animation-delay:.43s}

.dialog-box{
  background:var(--g-faint);
  border:1px solid var(--g-border);
  border-radius:var(--radius);
  padding:16px 18px;
  font-size:13.5px;
  line-height:1.75;
  color:rgba(200,255,210,.85);
  position:relative;
  overflow:hidden;
}
.dialog-box::before{
  content:'';
  position:absolute;top:0;left:0;
  width:3px;height:100%;
  background:linear-gradient(180deg,transparent,var(--g),transparent);
  opacity:.4;
}
.dialog-box .glitch-text{
  display:block;font-size:9px;color:rgba(0,255,65,.12);
  letter-spacing:2px;margin-top:8px;overflow:hidden;
  white-space:nowrap;animation:glitch-scroll 4s linear infinite;
}
@keyframes glitch-scroll{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}

.transmission{
  background:rgba(0,8,0,.6);
  border-left:2px solid rgba(0,255,65,.3);
  border-radius:0 var(--radius) var(--radius) 0;
  padding:12px 14px;
}
.transmission-title{
  font-family:var(--font-ui);font-weight:500;
  font-size:9px;letter-spacing:4px;
  color:var(--g);margin-bottom:6px;opacity:.6;
  display:flex;align-items:center;gap:6px;
}
.transmission-body{
  font-size:12.5px;color:rgba(0,200,50,.7);line-height:1.65;
}

.choose-label{
  font-family:var(--font-ui);font-weight:400;
  font-size:9px;letter-spacing:5px;
  color:rgba(0,200,50,.4);
  display:flex;align-items:center;gap:6px;
  margin-top:4px;padding-left:2px;
}

.choice-btn{
  width:100%;
  background:transparent;
  border:1px solid rgba(0,255,65,.1);
  border-radius:var(--radius);
  color:rgba(0,255,65,.8);
  text-align:left;
  padding:14px 16px;
  transition:all .2s ease;
  font-size:13px;
  position:relative;
  overflow:hidden;
}
.choice-btn::before{
  content:'';
  position:absolute;left:0;top:0;bottom:0;
  width:2px;
  background:var(--g);
  opacity:0;
  transition:opacity .2s;
}
.choice-btn:hover{
  background:var(--g-faint);
  border-color:rgba(0,255,65,.3);
  color:#fff;
  transform:translateX(3px);
}
.choice-btn:hover::before{opacity:1;}
.choice-btn:active{transform:translateX(1px) scale(.995);}
.choice-btn .choice-title{
  display:block;
  font-family:var(--font-ui);font-weight:500;
  font-size:14px;letter-spacing:1px;
  margin-bottom:3px;
}
.choice-btn .choice-effects{
  display:block;
  font-size:10px;
  color:rgba(0,180,50,.5);
  letter-spacing:.5px;
}
.choice-btn.driver{
  border-color:rgba(255,215,0,.2);
  color:rgba(255,215,0,.8);
}
.choice-btn.driver::before{background:var(--gold);}
.choice-btn.driver:hover{
  background:rgba(255,215,0,.04);
  border-color:rgba(255,215,0,.4);
}
.choice-btn.driver .choice-effects{color:rgba(184,134,11,.6);}

.alert-box{
  background:rgba(30,0,0,.6);
  border:1px solid rgba(255,50,50,.2);
  border-radius:var(--radius);
  padding:10px 14px;
  font-family:var(--font-ui);
  font-size:12px;letter-spacing:1px;
  color:rgba(255,80,80,.8);
  display:flex;align-items:center;gap:8px;
}

.combat-area{display:flex;flex-direction:column;gap:12px;}

.monster-card{
  background:var(--red-faint);
  border:1px solid rgba(255,59,59,.18);
  border-radius:var(--radius);
  padding:20px 16px;
  text-align:center;
  position:relative;overflow:hidden;
}
.monster-card::after{
  content:'';
  position:absolute;bottom:0;left:0;right:0;
  height:1px;
  background:linear-gradient(90deg,transparent,rgba(255,59,59,.3),transparent);
}
.monster-name{
  font-family:var(--title);
  font-size:clamp(38px,10vw,52px);
  color:var(--red);
  text-shadow:0 0 20px rgba(255,59,59,.4);
  letter-spacing:2px;
  line-height:1;
}
.monster-hp-track{
  height:4px;
  background:rgba(255,59,59,.08);
  border-radius:2px;overflow:hidden;
  margin:14px 0 6px;
}
.monster-hp-fill{
  height:100%;
  background:linear-gradient(90deg,#aa0000,var(--red));
  border-radius:2px;
  transition:width .5s cubic-bezier(.4,0,.2,1);
}
.monster-info{
  font-family:var(--font-ui);
  font-size:11px;color:rgba(255,100,100,.5);
